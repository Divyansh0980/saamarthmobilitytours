  <!-- Gold Orbit Swoosh -->
  <path d="M16 38 C16 38, 19 46, 31 42 C43 38, 47 26, 47 26" stroke="url(#gold)" stroke-width="3.5" stroke-linecap="round" />
  <path d="M17 37 C17 37, 21 22, 34 20 C44 18, 50 26, 50 26" stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round" opacity="0.7" />

  <!-- Gold Airplane pointing top-right (rotated ~35 deg) -->
