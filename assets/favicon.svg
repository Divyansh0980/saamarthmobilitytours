      <stop offset="0%" stop-color="#e8c86b" />
      <stop offset="100%" stop-color="#b58d24" />
    </linearGradient>
    <linearGradient id="globeBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3c72" />
      <stop offset="100%" stop-color="#0a192f" />
    </linearGradient>
  </defs>
  
  <!-- Mountains Silhouette in background -->
  <path d="M4 44 L18 31 L28 39 L48 28 L60 44 Z" fill="#4d3222" opacity="0.95" />
  <path d="M12 44 L24 33 L36 41 L52 30 L60 44 Z" fill="#2c1a0e" />

